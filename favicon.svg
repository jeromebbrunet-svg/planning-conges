<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- fond -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1A17" />
      <stop offset="100%" stop-color="#2F5FA8" />
    </linearGradient>

    <!-- glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <!-- ombre -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="3"
        stdDeviation="3"
        flood-color="#000"
        flood-opacity="0.3"
      />
    </filter>
  </defs>

  <!-- fond -->
  <rect
    x="6"
    y="6"
    width="52"
    height="52"
    rx="16"
    fill="url(#bg)"
    filter="url(#shadow)"
  />

  <!-- cercle principal -->
  <circle
    cx="32"
    cy="32"
    r="18"
    fill="none"
    stroke="#ffffff20"
    stroke-width="6"
  />

  <!-- segments (types de congés) -->
  <circle
    cx="32"
    cy="32"
    r="18"
    fill="none"
    stroke="#E05A4D"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="40 100"
    transform="rotate(-90 32 32)"
  />

  <circle
    cx="32"
    cy="32"
    r="18"
    fill="none"
    stroke="#2DA066"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="25 100"
    stroke-dashoffset="-45"
    transform="rotate(-90 32 32)"
  />

  <circle
    cx="32"
    cy="32"
    r="18"
    fill="none"
    stroke="#D4A017"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="20 100"
    stroke-dashoffset="-75"
    transform="rotate(-90 32 32)"
  />

  <!-- centre -->
  <circle cx="32" cy="32" r="7" fill="#ffffff" />

  <!-- petit symbole -->
  <rect x="29" y="29" width="6" height="6" rx="1.5" fill="#2F5FA8" />

  <!-- glow -->
  <circle cx="32" cy="28" r="20" fill="url(#glow)" />
</svg>
